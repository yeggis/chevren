<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Chevren — Log</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    h2 { margin: 0; font-size: 14px; color: #c8a84b; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .server-status { display: flex; align-items: center; gap: 5px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }
    .dot.ok  { background: #5cb85c; }
    .dot.err { background: #e05c5c; }
    #server-text { font-size: 10px; color: rgba(255,255,255,0.35); }
    .btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
    }
    .btn:hover { color: #e0e0e0; border-color: rgba(255,255,255,0.25); }
    .status-bar {
      display: flex;
      gap: 24px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      font-size: 11px;
    }
    .st-item { display: flex; gap: 6px; }
    .st-label { color: rgba(255,255,255,0.3); }
    .st-val { color: #e0e0e0; }
    .st-val.working { color: #c8a84b; }
    .st-val.done    { color: #5cb85c; }
    .st-val.err     { color: #e05c5c; }
    #log-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 11px;
    }
    .log-entry {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .log-time { color: rgba(255,255,255,0.22); flex-shrink: 0; }
    .log-msg         { color: #e0e0e0; }
    .log-msg.working { color: #c8a84b; }
    .log-msg.done    { color: #5cb85c; }
    .log-msg.err     { color: #e05c5c; }
    .log-empty {
      color: rgba(255,255,255,0.2);
      text-align: center;
      padding: 60px 0;
      font-family: system-ui;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>chevren — log</h2>
    <div class="header-right">
      <div class="server-status">
        <div class="dot" id="server-dot"></div>
        <span id="server-text">bağlanıyor</span>
      </div>
      <button class="btn" id="clear-log">temizle</button>
    </div>
  </div>
  <div class="status-bar">
    <div class="st-item">
      <span class="st-label">video</span>
      <span class="st-val" id="st-video">—</span>
    </div>
    <div class="st-item">
      <span class="st-label">aşama</span>
      <span class="st-val" id="st-stage">—</span>
    </div>
    <div class="st-item">
      <span class="st-label">parça</span>
      <span class="st-val" id="st-chunk">—</span>
    </div>
  </div>
  <div id="log-wrap">
    <div class="log-empty">henüz log yok</div>
  </div>
  <script src="log.js"></script>
</body>
</html>
