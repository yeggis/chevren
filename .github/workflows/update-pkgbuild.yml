name: Update PKGBUILD checksum

on:
  push:
    tags:
      - 'v*'

jobs:
  update-checksum:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download tarball and compute checksum
        id: checksum
        run: |
          URL="https://github.com/yeggis/chevren/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz"
          curl -L "$URL" -o tarball.tar.gz
          HASH=$(sha256sum tarball.tar.gz | cut -d' ' -f1)
          echo "HASH=$HASH" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
          sed -i "s/sha256sums=('.*')/sha256sums=('${{ steps.checksum.outputs.HASH }}')/" PKGBUILD

      - name: Commit updated PKGBUILD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --staged --quiet || git commit -m "chore: update PKGBUILD for ${{ github.ref_name }}"
          git push origin HEAD:main
