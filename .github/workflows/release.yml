name: Release - Windows install.exe

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exe:
    name: "Windows install.exe uret"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip guncelle
        run: python -m pip install --upgrade pip

      - name: PyInstaller ve bagimliliklar
        run: python -m pip install pyinstaller platformdirs urllib3 charset-normalizer

      - name: install.py exe yap
        run: pyinstaller --onefile --console --name install install.py

      - name: Exe dogrula
        run: dir dist\install.exe

      - name: Artifact kaydet
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/install.exe
          retention-days: 1

  create-release:
    name: "GitHub Release olustur"
    runs-on: ubuntu-latest
    needs: build-windows-exe
    permissions:
      contents: write
    steps:
      - name: Artifact indir
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Release olustur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Chevren ${{ github.ref_name }}"
          body: |
            ## Windows Kurulum
            1. install.exe dosyasini indir
            2. Cift tikla - kurulum baslar
            3. Kurulum bittikten sonra Entere bas

            Not: Windows Defender uyari verebilir.
            "Daha fazla bilgi" -> "Yine de calistir" adimlarini takip et.

            ## Linux
            Arch/CachyOS: AURdan chevren paketini kur
            Diger distrolarda: bash install.sh
          draft: false
          prerelease: false
          files: dist/install.exe
